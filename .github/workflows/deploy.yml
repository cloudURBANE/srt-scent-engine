name: test-and-deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt -r requirements-dev.txt

      - run: python run_tests.py

  deploy:
    # AWS cutover switch (docs/AWS_MIGRATION_PLAN.md §5): this job is skipped
    # until the repo variable AWS_DEPLOY_ENABLED is set to 'true', so Railway's
    # git-push deploy stays the production path during the parallel-run phase.
    # Required repo variables once enabled: AWS_REGION, AWS_DEPLOY_ROLE_ARN
    # (OIDC role — no long-lived keys), ECR_REPOSITORY, and optionally
    # APPRUNNER_SERVICE_ARN (omit if the App Runner service auto-deploys on
    # ECR push).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.AWS_DEPLOY_ENABLED == 'true'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push image
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}"
          docker build \
            --build-arg GIT_COMMIT="${{ github.sha }}" \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" \
            .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Start App Runner deployment
        if: vars.APPRUNNER_SERVICE_ARN != ''
        run: aws apprunner start-deployment --service-arn "${{ vars.APPRUNNER_SERVICE_ARN }}"
